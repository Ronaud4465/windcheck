<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WindCheck">
<meta name="theme-color" content="#1a3a1a">
<title>WindCheck</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --v:#1a3a1a;--v3:#0a180a;--or:#c9a84c;
  --bg:#141e14;--bg2:#1a261a;--bg3:#0f180f;
  --ok:#2a9e44;--warn:#d97318;
  --txt:#eee8d8;--txt2:rgba(238,232,216,0.5);
  --r:12px;--r2:18px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--txt);-webkit-tap-highlight-color:transparent;}
#app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;}
.topbar{background:var(--v3);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--or);flex-shrink:0;}
.brand{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;color:var(--or);}
.brand em{color:var(--txt);font-style:normal;font-weight:400;font-size:.9rem;}
.spill{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);color:var(--or);font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:20px;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen{padding:14px 12px 32px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--bg2);border-radius:var(--r2);border:1px solid rgba(201,168,76,.15);overflow:hidden;}
.ch{background:var(--v);padding:10px 14px;font-weight:700;font-size:.9rem;color:var(--txt);display:flex;align-items:center;gap:8px;}
.cb{padding:14px;}
.f{margin-bottom:10px;position:relative;}
.f:last-child{margin-bottom:0;}
.f label{display:block;font-size:.62rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--txt2);margin-bottom:4px;}
.f input,.f textarea{width:100%;padding:10px 12px;background:var(--bg3);border:1.5px solid rgba(201,168,76,.2);border-radius:var(--r);color:var(--txt);font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;-webkit-appearance:none;}
.f input:focus{border-color:var(--or);}
.f textarea{resize:none;min-height:70px;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}

/* DROPDOWN MEMOIRE */
.mem-dropdown{position:absolute;top:100%;left:0;right:0;background:#1a2e1a;border:1.5px solid var(--or);border-radius:var(--r);z-index:50;max-height:160px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.mem-item{padding:10px 12px;font-size:.88rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;}
.mem-item:last-child{border-bottom:none;}
.mem-item:hover,.mem-item:active{background:rgba(201,168,76,.15);}
.mem-del{width:20px;height:20px;background:rgba(200,50,50,.7);border-radius:50%;border:none;color:#fff;font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.btn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.95rem;letter-spacing:.04em;text-transform:uppercase;padding:14px;border-radius:var(--r);border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;color:#fff!important;transition:all .12s;}
.btn:active{transform:scale(.97);}
.bor{background:#b8920a;border-color:var(--or);}
.bok{background:#1e7a32;border-color:var(--ok);}
.bblue{background:#0a4a8a;border-color:#2a7acc;}
.bdrive{background:#1a6a2a;border-color:var(--ok);}
.bwarn{background:#8a4010;border-color:var(--warn);}
.bghost{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.22);color:var(--txt)!important;}
.bsm{padding:9px 12px;font-size:.8rem;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.stat{background:var(--bg3);border-radius:var(--r);padding:10px 8px;text-align:center;border:1px solid rgba(201,168,76,.1);}
.sn{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:800;line-height:1;}
.sl{font-size:.6rem;letter-spacing:.07em;text-transform:uppercase;color:var(--txt2);margin-top:2px;}
.tl{display:flex;flex-direction:column;gap:6px;}
.tr{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:var(--r);border:1.5px solid rgba(201,168,76,.1);cursor:pointer;}
.tr:active{background:#1e2e1e;}
.tb{width:38px;height:38px;border-radius:8px;background:var(--v);color:var(--or);font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(201,168,76,.25);}
.tb.ok{background:var(--ok);color:#fff;border-color:var(--ok);}
.tb.warn{background:var(--warn);color:#fff;border-color:var(--warn);}
.ti{flex:1;min-width:0;}
.tn{font-weight:700;font-size:.88rem;}
.tm{font-size:.67rem;color:var(--txt2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tt{display:flex;gap:3px;}
.th{width:26px;height:26px;border-radius:5px;object-fit:cover;border:1.5px solid rgba(201,168,76,.25);}
.the{width:26px;height:26px;border-radius:5px;background:var(--bg3);border:1.5px dashed rgba(201,168,76,.15);display:flex;align-items:center;justify-content:center;font-size:.48rem;color:var(--txt2);}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.78);z-index:10;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--bg2);border-radius:18px 18px 0 0;border:1px solid rgba(201,168,76,.2);padding:16px 13px 32px;width:100%;height:88%;overflow-y:scroll;-webkit-overflow-scrolling:touch;}
.handle{width:30px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 12px;}
.sh3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1rem;color:var(--or);margin-bottom:11px;}
.num-row{display:flex;gap:7px;}
.big-input{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:800;text-align:center;letter-spacing:.08em;padding:12px;background:var(--bg3);border:2px solid rgba(201,168,76,.3);border-radius:var(--r);color:var(--txt);outline:none;flex:1;text-transform:uppercase;}
.big-input:focus{border-color:var(--or);}
.big-input::placeholder{opacity:.25;}
.scan-btn{background:var(--v);border:2px solid var(--or);border-radius:var(--r);color:#fff;font-size:1.3rem;width:52px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex-shrink:0;}
.scan-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.5rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--or);}
.gps-row{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg3);border-radius:8px;border:1px solid rgba(201,168,76,.12);font-size:.67rem;color:var(--txt2);margin-bottom:8px;}
.gdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--warn);animation:pulse 1.2s infinite;}
.gdot.ok{background:var(--ok);animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pslot{position:relative;border-radius:var(--r);border:2px dashed rgba(201,168,76,.22);background:var(--bg3);aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
.pslot.filled{border-style:solid;border-color:var(--ok);}
.pslot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.pslot input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2;}
.pico{font-size:1.5rem;opacity:.28;margin-bottom:2px;}
.plbl{font-size:.62rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--or);position:relative;z-index:1;}
.pover{position:absolute;bottom:0;left:0;right:0;background:rgba(8,20,8,.88);padding:3px;font-size:.6rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--or);text-align:center;z-index:1;}
.pdel{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(190,45,45,.88);border-radius:50%;border:none;color:#fff;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;}
.ocr-box{display:flex;align-items:center;gap:7px;padding:8px 10px;background:rgba(201,168,76,.07);border-radius:8px;border:1px solid rgba(201,168,76,.18);font-size:.78rem;color:var(--or);margin-top:5px;}
.spin{width:12px;height:12px;border:2px solid rgba(201,168,76,.25);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.rcard{background:var(--v);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;border:1px solid rgba(201,168,76,.15);}
.rhead{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.rnum{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.95rem;color:var(--or);}
.rphotos{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px;}
.rphoto{border-radius:6px;overflow:hidden;aspect-ratio:4/3;background:var(--bg2);position:relative;}
.rphoto img{width:100%;height:100%;object-fit:cover;}
.rtag{position:absolute;bottom:0;left:0;right:0;background:rgba(8,20,8,.85);text-align:center;font-size:.58rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--or);padding:2px;}
.rprob{margin-top:7px;padding:8px 10px;background:rgba(217,115,24,.1);border-radius:7px;border:1px solid rgba(217,115,24,.25);}
.rprobh{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--warn);margin-bottom:3px;}
.rprobphotos{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:5px;}
.rprobphoto{border-radius:4px;overflow:hidden;aspect-ratio:1;}
.rprobphoto img{width:100%;height:100%;object-fit:cover;}
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:.62rem;font-weight:700;}
.pok{background:rgba(42,158,68,.2);color:#7eff9a;}
.pwarn{background:rgba(217,115,24,.2);color:#ffb870;}
.ptodo{background:rgba(201,168,76,.15);color:var(--or);}
.drive-box{background:#0a1e0a;border-radius:var(--r);border:1px solid rgba(46,168,74,.3);padding:12px;margin-bottom:10px;}
.drive-title{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ok);margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.urow{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.76rem;}
.urow:last-child{border-bottom:none;}
.uname{flex:1;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ust{font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:10px;}
.uw{background:rgba(201,168,76,.15);color:var(--or);}
.uu{background:rgba(42,122,200,.15);color:#7ab8ff;display:flex;align-items:center;gap:4px;}
.ud{background:rgba(42,168,74,.15);color:#7eff9a;}
.ue{background:rgba(200,50,50,.15);color:#ff8888;}
.prog{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:7px;overflow:hidden;}
.progf{height:100%;background:var(--ok);border-radius:2px;transition:width .4s;}
.share-box{background:#0a1a2e;border-radius:var(--r);border:1px solid rgba(42,122,200,.3);padding:12px;}
.share-title{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#7ab8ff;margin-bottom:7px;}
.share-link{font-size:.72rem;color:var(--txt2);background:var(--bg3);padding:7px 9px;border-radius:7px;word-break:break-all;margin-bottom:7px;}
.expnote{font-size:.65rem;color:var(--txt2);text-align:center;margin-top:5px;opacity:.5;}
.div{height:1px;background:rgba(255,255,255,.07);margin:10px 0;}
.lsm{font-size:.62rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--txt2);margin-bottom:7px;display:block;}
.toast{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--v);border:1px solid var(--or);color:var(--or);padding:8px 16px;border-radius:22px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;z-index:20;white-space:nowrap;pointer-events:none;}
.splash{position:absolute;inset:0;background:var(--v3);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;}
.splash-logo{font-family:'Barlow Condensed',sans-serif;font-size:2.8rem;font-weight:800;color:var(--or);letter-spacing:.04em;}
.splash-sub{font-size:.85rem;color:var(--txt2);letter-spacing:.15em;text-transform:uppercase;margin-top:6px;}
.splash-wind{font-size:4rem;margin-bottom:16px;animation:spin 3s linear infinite;}
</style>
</head>
<body>
<div id="app">
  <div class="splash" id="splash">
    <div class="splash-wind">💨</div>
    <div class="splash-logo">WindCheck</div>
    <div class="splash-sub">App terrain éolien</div>
  </div>
  <div class="topbar">
    <div class="brand">Wind<em>Check</em></div>
    <div id="spill" style="display:none" class="spill"></div>
  </div>
  <div class="scroll"><div id="main"></div></div>
</div>
<script>
const DRIVE_FOLDER_ID='1PmtDyBLY3vjKA1fOvcTdz8_n4vkKMUVO';

// ── MEMOIRE localStorage ──────────────────────────────────────
function memGet(key){try{return JSON.parse(localStorage.getItem('wc_'+key)||'[]');}catch{return[];}}
function memAdd(key,val){
  if(!val||!val.trim())return;
  let arr=memGet(key);
  arr=arr.filter(x=>x.toLowerCase()!==val.toLowerCase());
  arr.unshift(val.trim());
  if(arr.length>10)arr=arr.slice(0,10);
  try{localStorage.setItem('wc_'+key,JSON.stringify(arr));}catch{}
}
function memDel(key,val){
  let arr=memGet(key).filter(x=>x!==val);
  try{localStorage.setItem('wc_'+key,JSON.stringify(arr));}catch{}
  render();
}

let S={screen:'start',session:null,turbines:[],sheet:null,toast:null,
  sf:{client:'',site:'',date:today(),tech:memGet('tech')[0]||''},
  ss:null,up:null,
  dropdown:null // {field, items}
};

function today(){return new Date().toISOString().split('T')[0];}
function genRef(){const d=new Date();return `WC-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*900)+100)}`;}
function readFile(f){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(f);});}
function showToast(m){S.toast=m;render();setTimeout(()=>{S.toast=null;render();},2800);}
function getGPS(){return new Promise(r=>{if(!navigator.geolocation){r(null);return;}navigator.geolocation.getCurrentPosition(p=>r({lat:p.coords.latitude.toFixed(5),lng:p.coords.longitude.toFixed(5),acc:Math.round(p.coords.accuracy)}),()=>r(null),{timeout:8000,maximumAge:30000});});}

async function ocrPlaque(b64data){
  try{
    const b64=b64data.split(',')[1];
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:60,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
        {type:'text',text:'Lis le numero identifiant sur cette plaque eolienne (ex: EOL-007). Reponds UNIQUEMENT avec ce code. Si illisible: INCONNU.'}
      ]}]})});
    const d=await res.json();
    return(d.content?.[0]?.text||'').trim().toUpperCase().replace(/[^A-Z0-9\-_]/g,'').slice(0,12)||null;
  }catch(e){return null;}
}

function genRapportHTML(session,turbines){
  const done=turbines.filter(t=>t.av&&t.ap).length;
  const probs=turbines.filter(t=>t.prob).length;
  const expiry=new Date();expiry.setDate(expiry.getDate()+7);
  const expiryStr=expiry.toLocaleDateString('fr-BE',{day:'2-digit',month:'long',year:'numeric'});
  const now=new Date().toLocaleString('fr-BE');
  const tH=turbines.map(t=>`<div style="background:#fff;border-radius:10px;border:1px solid #e0d9cc;overflow:hidden;margin-bottom:13px;"><div style="background:#1a3a1a;padding:11px 15px;display:flex;align-items:center;justify-content:space-between;"><div><div style="font-size:1.05rem;font-weight:900;color:#c9a84c;">Eolienne ${t.num}</div>${t.gps?`<div style="font-size:.62rem;color:rgba(240,235,224,.35);">GPS: ${t.gps.lat}, ${t.gps.lng}</div>`:''}</div><div style="display:flex;gap:5px;"><span style="padding:2px 8px;border-radius:20px;font-size:.6rem;font-weight:700;background:${t.av&&t.ap?'rgba(30,122,50,.15)':'rgba(184,146,10,.12)'};color:${t.av&&t.ap?'#1e7a32':'#b8920a'};">${t.av&&t.ap?'Complet':'Partiel'}</span>${t.prob?'<span style="padding:2px 8px;border-radius:20px;font-size:.6rem;font-weight:700;background:rgba(160,80,16,.12);color:#a05010;">Probleme</span>':''}</div></div><div style="padding:13px 15px;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">${['av','ap'].map((k,i)=>`<div style="border-radius:7px;overflow:hidden;position:relative;background:#e8e2d8;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;">${t[k]?`<img src="${t[k]}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="color:#b0a898;font-size:.72rem;font-style:italic;">Photo '+(i===0?'avant':'apres')+'</span>'}<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(26,58,26,.88);text-align:center;padding:4px;font-size:.6rem;font-weight:700;text-transform:uppercase;color:#c9a84c;">${i===0?'Avant':'Apres'}</div></div>`).join('')}</div>${t.prob?`<div style="background:#fff8f0;border:1.5px solid #d97318;border-radius:7px;padding:11px;margin-top:10px;"><div style="font-size:.62rem;font-weight:700;text-transform:uppercase;color:#a05010;margin-bottom:4px;">Probleme signale</div><div style="font-size:.85rem;color:#3a2010;">${t.pd||'Sans description'}</div>${t.pp?.length?`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px;">${t.pp.map(p=>typeof p==='string'?`<div style="border-radius:5px;overflow:hidden;aspect-ratio:1;"><img src="${p}" style="width:100%;height:100%;object-fit:cover;"></div>`:'').join('')}</div>`:''}</div>`:''}</div></div>`).join('');
  return `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WindCheck ${session.ref}</title><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;background:#f0ebe0;color:#1a2e1a;}</style></head><body><div style="background:#1a3a1a;padding:22px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;"><div style="font-size:1.6rem;font-weight:900;color:#c9a84c;">Wind<span style="color:#f0ebe0;font-weight:400;">Check</span><small style="display:block;font-size:.65rem;color:rgba(240,235,224,.4);letter-spacing:.12em;text-transform:uppercase;margin-top:2px;">App Terrain Eolien</small></div><div style="text-align:right;color:#c9a84c;font-size:.95rem;font-weight:700;">${session.ref}<small style="display:block;font-size:.65rem;color:rgba(240,235,224,.4);margin-top:2px;">Genere le ${now}</small></div></div><div style="background:#243f24;padding:11px 32px;display:flex;gap:24px;border-bottom:2px solid #c9a84c;flex-wrap:wrap;">${[['Client',session.client],['Site',session.site],['Date',session.date],['Technicien',session.tech]].map(([l,v])=>`<div style="display:flex;flex-direction:column;"><span style="font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,235,224,.4);">${l}</span><span style="font-size:.88rem;font-weight:600;color:#f0ebe0;margin-top:1px;">${v}</span></div>`).join('')}</div><div style="display:flex;background:#fff;border-bottom:2px solid #e0d9cc;">${[['Traitees',turbines.length,'#b8920a'],['Completes',done,'#1e7a32'],['Problemes',probs,'#a05010']].map(([l,v,c])=>`<div style="flex:1;padding:13px;text-align:center;border-right:1px solid #e0d9cc;"><div style="font-size:1.9rem;font-weight:900;color:${c};">${v}</div><div style="font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8a8070;margin-top:2px;">${l}</div></div>`).join('')}</div><div style="max async function uploadToDrive(session,turbines){
  S.up={phase:'uploading',items:[],progress:0,folderId:DRIVE_FOLDER_ID,shareLink:null};
  const rapport=genRapportHTML(session,turbines);
  const items=[{name:`Rapport_${session.ref}.html`,text:rapport,type:'text/html',label:'Rapport HTML'}];
  turbines.forEach(t=>{
    if(t.av)items.push({name:`${t.num}_avant.jpg`,data:t.av,type:'image/jpeg',label:`${t.num} Avant`});
    if(t.ap)items.push({name:`${t.num}_apres.jpg`,data:t.ap,type:'image/jpeg',label:`${t.num} Apres`});
    t.pp?.forEach((p,j)=>{if(typeof p==='string')items.push({name:`${t.num}_prob_${j+1}.jpg`,data:p,type:'image/jpeg',label:`${t.num} Probleme ${j+1}`});});
  });
  S.up.items=items.map(i=>({...i,status:'wait'}));render();
  for(let i=0;i<items.length;i++){
    S.up.items[i].status='uploading';S.up.progress=Math.round((i/items.length)*100);render();
    try{
      await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,
          mcp_servers:[{type:'url',url:'https://drivemcp.googleapis.com/mcp/v1',name:'gdrive'}],
          messages:[{role:'user',content:`Uploade ce fichier sur Google Drive dans le dossier ID "${DRIVE_FOLDER_ID}" avec le titre "${items[i].name}". ${items[i].data?'Contenu base64: '+items[i].data:'Contenu texte: '+items[i].text?.slice(0,500)+'...'}`}]})});
      S.up.items[i].status='done';
    }catch(e){S.up.items[i].status='error';}
    S.up.progress=Math.round(((i+1)/items.length)*100);render();
    await new Promise(r=>setTimeout(r,400));
  }
  const expiry=new Date();expiry.setDate(expiry.getDate()+7);
  S.up.phase='done';
  S.up.shareLink=`https://drive.google.com/drive/folders/${DRIVE_FOLDER_ID}`;
  S.up.expiryDate=expiry.toLocaleDateString('fr-BE',{day:'2-digit',month:'long',year:'numeric'});
  S.up.progress=100;render();
}

function render(){
  const sp=document.getElementById('spill');
  if(S.session){sp.style.display='block';sp.textContent=S.session.site.slice(0,18)+' · '+S.session.date;}
  else sp.style.display='none';
  let html='';
  if(S.screen==='start')html=renderStart();
  else if(S.screen==='session')html=renderSession();
  let ov='';
  if(S.sheet==='new')ov=renderSheet(null);
  else if(S.sheet?.startsWith('edit:'))ov=renderSheet(parseInt(S.sheet.split(':')[1]));
  else if(S.sheet==='rapport')ov=renderRapport();
  document.getElementById('main').innerHTML=`<div class="screen">${html}</div>${ov}${S.toast?`<div class="toast">${S.toast}</div>`:''}`;
  bind();
}

function bind(){
  const el=id=>document.getElementById(id);
  const on=(id,fn)=>{const e=el(id);if(e)e.onclick=fn;};

  on('btn-start',()=>{
    const client=el('s-client')?.value?.trim()||'';
    const site=el('s-site')?.value?.trim()||'';
    const tech=el('s-tech')?.value?.trim()||'';
    const date=el('s-date')?.value||'';
    if(!client||!site||!tech){showToast('⚠ Remplis tous les champs');return;}
    // Sauvegarder dans la mémoire
    memAdd('client',client);memAdd('site',site);memAdd('tech',tech);
    S.sf={client,site,date,tech};
    S.session={...S.sf,ref:genRef()};S.screen='session';S.ss=null;S.dropdown=null;render();
  });

  // Boutons mémoire ▾
  ['s-client','s-site','s-tech'].forEach(id=>{
    const btn=document.getElementById('btn-mem-'+id);
    if(btn)btn.onclick=e=>{e.stopPropagation();S.dropdown=S.dropdown?.field===id?null:{field:id};render();};
  });

  // Clic sur item mémoire
  document.querySelectorAll('[data-memfield]').forEach(item=>{
    item.onclick=e=>{
      if(e.target.closest('.mem-del'))return;
      const fieldId=item.dataset.memfield;
      const val=item.dataset.memval;
      const input=document.getElementById(fieldId);
      if(input)input.value=val;
      if(fieldId==='s-client')S.sf.client=val;
      if(fieldId==='s-site')S.sf.site=val;
      if(fieldId==='s-tech')S.sf.tech=val;
      S.dropdown=null;render();
    };
  });

  // Supprimer item mémoire
  document.querySelectorAll('.mem-del').forEach(btn=>{
    btn.onclick=e=>{e.stopPropagation();memDel(btn.dataset.memkey,btn.dataset.memdelval);};
  });

  // Fermer dropdown en cliquant ailleurs
  document.addEventListener('click',e=>{
    if(S.dropdown&&!e.target.closest('.f')){S.dropdown=null;render();}
  },{once:true});

  on('btn-new',()=>{S.sheet='new';initSS(null);render();});
  on('btn-rapport',()=>{S.sheet='rapport';S.up=null;render();});
  on('btn-back',()=>{S.screen='start';S.session=null;S.turbines=[];S.sheet=null;S.up=null;render();});
  document.querySelectorAll('[data-edit]').forEach(e=>{if(e.tagName==='DIV')e.onclick=()=>{const i=parseInt(e.dataset.edit);S.sheet='edit:'+i;initSS(i);render();};});
  on('btn-cancel',()=>{S.sheet=null;S.ss=null;render();});
  const ov=el('overlay');if(ov)ov.onclick=e=>{if(e.target===ov){S.sheet=null;S.ss=null;render();}};
  const ni=el('turb-num');if(ni)ni.oninput=e=>{if(S.ss)S.ss.num=e.target.value;};
  on('btn-prob',()=>{if(S.ss)S.ss.prob=!S.ss.prob;render();});
  const pd=el('prob-desc');if(pd)pd.oninput=e=>{if(S.ss)S.ss.pd=e.target.value;};
  const si=el('scan-inp');
  if(si)si.onchange=async e=>{const f=e.target.files[0];if(!f)return;const data=await readFile(f);if(S.ss)S.ss.ocr=true;render();const res=await ocrPlaque(data);if(S.ss)S.ss.ocr=false;if(res&&res!=='INCONNU'){if(S.ss)S.ss.num=res;showToast('🔍 Lu : '+res);}else showToast('⚠ Illisible - saisir manuellement');render();};
  document.querySelectorAll('[data-photo]').forEach(inp=>{inp.onchange=async e=>{const f=e.target.files[0];if(!f)return;const data=await readFile(f);if(!S.ss)return;const k=inp.dataset.photo;if(k==='av')S.ss.av=data;else if(k==='ap')S.ss.ap=data;else if(k==='pp'&&S.ss.pp.length<3)S.ss.pp=[...S.ss.pp,data];render();};});
  document.querySelectorAll('[data-clear]').forEach(b=>{b.onclick=e=>{e.stopPropagation();if(!S.ss)return;const k=b.dataset.clear;if(k==='av')S.ss.av=null;else if(k==='ap')S.ss.ap=null;render();};});
  document.querySelectorAll('[data-dpp]').forEach(b=>{b.onclick=e=>{e.stopPropagation();const i=parseInt(b.dataset.dpp);if(S.ss)S.ss.pp=S.ss.pp.filter((_,j)=>j!==i);render();};});
  on('btn-save',()=>{
    const num=(el('turb-num')?.value||S.ss?.num||'').trim().toUpperCase();if(!num)return;
    const ss=S.ss||{};const turb={num,av:ss.av||null,ap:ss.ap||null,prob:ss.prob||false,pd:ss.pd||'',pp:ss.pp||[],gps:ss.gps||null};
    const ei=el('btn-save')?.dataset.ei;
    if(ei!==''){const i=parseInt(ei);S.turbines=S.turbines.map((x,j)=>j===i?turb:x);showToast('✅ Mis a jour');}
    else{S.turbines=[...S.turbines,turb];showToast('✅ Eol. '+num+' enregistree');}
    S.sheet=null;S.ss=null;render();
  });
  on('btn-upload',()=>uploadToDrive(S.session,S.turbines));
  on('btn-copy',()=>{if(S.up?.shareLink){navigator.clipboard?.writeText(S.up.shareLink).then(()=>showToast('📋 Lien copie!')).catch(()=>showToast('Lien: '+S.up.shareLink));}});
}

setTimeout(()=>{document.getElementById('splash').style.display='none';render();},1800);
</script>
</body>
</html>
